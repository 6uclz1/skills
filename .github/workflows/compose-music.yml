name: compose-music checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-compose-music:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m unittest discover compose-music/tests
      - run: node evals/run-compose-music-evals.mjs --dry-run
